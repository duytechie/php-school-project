# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name ct275.localhost localhost;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    http2 on;
    server_name ct275.localhost localhost;
    root /var/www/html/public;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/ct275.localhost+3.pem;
    ssl_certificate_key /etc/nginx/ssl/ct275.localhost+3-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    index index.php index.html;
    
    # Serve static assets (CSS, JS, fonts, vendor) from app/views directory
    location ~* ^/(vendor|css|js|fonts)/ {
        root /var/www/html/app/views;
        try_files $uri =404;
        expires 30d;
        access_log off;
    }
    
    # Serve images from public directory
    location /images/ {
        root /var/www/html/public;
        try_files $uri =404;
        expires 30d;
        access_log off;
    }
    
    # Serve static files from views directory (for PHP templates)
    location /views/ {
        alias /var/www/html/app/views/;
        try_files $uri $uri/ =404;
    }
    
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }
    
    location ~ /\.ht {
        deny all;
    }
}
